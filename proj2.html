<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Calculator</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1f2933;
    font-family:Segoe UI, sans-serif;
}

.calculator{
    background:#323f4b;
    padding:25px;
    border-radius:15px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.display{
    width:100%;
    height:60px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:28px;
    text-align:right;
    padding:10px;
    background:#1f2933;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

/* Number buttons */
.number{
    background:#52606d;
    color:white;
}

/* Operator buttons */
.operator{
    background:#f9703e;
    color:white;
}

/* Equal button */
.equal{
    background:#27ae60;
    color:white;
    grid-column:span 2;
}

/* Clear button */
.clear{
    background:#ef4e4e;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="append('/')">/</button>
<button class="operator" onclick="append('*')">*</button>
<button class="operator" onclick="append('-')">-</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>

<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

function append(val){
document.getElementById("display").value += val;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function calculate(){
try{
let result = eval(document.getElementById("display").value);
document.getElementById("display").value = result;
}
catch{
document.getElementById("display").value="Error";
}
}

</script>

</body>
</html>
